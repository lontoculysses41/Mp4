<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOID System Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body, html {
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #000;
  }

  /* Full-screen video */
  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;   /* ← KEY FIX: fills screen properly */
    z-index: 0;          /* ← was -1, now visible */
  }

  /* Dark overlay so text is readable */
  .overlay-bg {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    z-index: 1;
  }

  /* Overlay text */
  .overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
    z-index: 2;
  }

  .overlay h1 { font-size: 3em; margin-bottom: 0.3em; }
  .overlay p  { font-size: 1.2em; }

  @media (max-width: 768px) {
    .overlay h1 { font-size: 2em; }
    .overlay p  { font-size: 1em; }
  }
</style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="demo.mp4" type="video/mp4">
</video>

<div class="overlay-bg"></div>

<div class="overlay">
  <h1>SOID System Demo</h1>
  <p>Showcasing IT Process Improvement Tools</p>
</div>

</body>
</html>
